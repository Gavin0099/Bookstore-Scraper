scraper:
  delay_min: 1.0          # 請求間隔下限（秒）
  delay_max: 3.0          # 請求間隔上限（秒）
  timeout: 15             # 單頁請求逾時（秒）
  max_retries: 3          # 最大重試次數
  backoff_factor: 2       # Exponential backoff 倍數
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

suncolor:
  base_url: "https://www.suncolor.com.tw"
  excel_prefix: "三采文化"
  catalog_path: "BookList.aspx"          # 一般分類目錄（備用）
  kids_catalog_path: "KidsBookList.aspx" # 童書分齡推薦目錄
  book_path: "BookPage.aspx"
  page_size: 18
  categories:
    - {knd: "70", knd2: "7001", name: "學齡前0~3歲", path: "kids"}
    - {knd: "70", knd2: "7002", name: "學齡前3~6歲", path: "kids"}
    - {knd: "71", knd2: "7105", name: "小妖怪系列",   path: "kids"}
    - {knd: "74", knd2: "74",   name: "套書推薦",     path: "kids"}

weesing:
  base_url: "https://www.weesing123.com.tw"
  excel_prefix: "華碩文化"
  categories:
    - {slug: "sound-book",          name: "有聲書"}
    - {slug: "pop-up-book",         name: "立體書"}
    - {slug: "play-book",           name: "遊戲書"}
    - {slug: "talking-pen-edition", name: "點讀書"}
    - {slug: "new-arrival",         name: "新品上市"}

acmebook:
  base_url: "https://www.acmebook.com.tw"
  excel_prefix: "采實文化"
  categories:
    - {type_sn1: "1",  name: "飲食"}
    - {type_sn1: "2",  name: "生活風格"}
    - {type_sn1: "3",  name: "醫療保健"}
    - {type_sn1: "4",  name: "親子教養"}
    - {type_sn1: "5",  name: "商業理財"}
    - {type_sn1: "6",  name: "藝術設計"}
    - {type_sn1: "7",  name: "心理勵志"}
    - {type_sn1: "8",  name: "學習語言"}
    - {type_sn1: "9",  name: "人文史地"}
    - {type_sn1: "10", name: "童書"}
    - {type_sn1: "12", name: "自然科普"}
    - {type_sn1: "15", name: "文學小說"}
    - {type_sn1: "16", name: "DUDUBAO"}

output:
  directory: "."
  log_prefix: "scraper"

# 過濾規則（缺書關鍵字）
filter:
  exclude_keywords:
    - "缺書"
    - "缺貨"
    - "絕版"
    - "停售"
    - "預購"
  # schema.org availability 非此值則排除
  available_status: "https://schema.org/InStock"
